<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard LED Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white shadow p-4 rounded" style="max-width: 900px;">
        <h2 class="text-primary mb-4">LED Board Configuration Tool</h2>
        
        <div class="row">
            <div class="col-md-5">
                <label class="form-label fw-bold">Select Scoreboard Model:</label>
                <select id="modelPicker" class="form-select mb-4" onchange="loadModel()">
                    <option value="">-- Choose One --</option>
                    {% for model in models %}<option value="{{ model }}">{{ model }}</option>{% endfor %}
                </select>
                
                <div class="text-center border p-2 rounded">
                    <p class="text-muted small">Model Preview</p>
                    <img id="scoreImg" src="" class="img-fluid rounded" style="display:none; max-height: 250px;">
                    <div id="noImg" class="py-5 bg-light text-muted">Select a model to see image</div>
                </div>
            </div>

            <div class="col-md-7">
                <table class="table table-striped border">
                    <thead class="table-dark">
                        <tr><th>Board Type</th><th>Size (in)</th><th>Quantity</th></tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr><td colspan="3" class="text-center">Select a model to see data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    async function loadModel() {
        const model = document.getElementById('modelPicker').value;
        if (!model) return;

        // 1. Show the Image from Electro-Mech
        const img = document.getElementById('scoreImg');
        const noImg = document.getElementById('noImg');
        img.src = `https://www.electro-mech.com/wp-content/uploads/${model}.png`;
        img.style.display = 'block';
        noImg.style.display = 'none';

        // 2. Fetch the LED board data from our Python "Waiter"
        const response = await fetch(`/api/${model}`);
        const data = await response.json();

        // 3. Update the table on the page
        document.getElementById('dataTable').innerHTML = data.map(item => `
            <tr>
                <td class="text-uppercase">${item.pcbType}</td>
                <td>${item.pcbSize}"</td>
                <td class="fw-bold text-primary">${item.count}</td>
            </tr>
        `).join('');
    }
    </script>
</body>
</html>
